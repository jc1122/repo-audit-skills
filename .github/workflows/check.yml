name: check

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            coverage==7.14.1 \
            pytest==9.0.3 \
            pytest-cov==7.1.0 \
            lizard==1.23.0 \
            radon==6.0.1 \
            vulture==2.16 \
            ruff==0.15.16 \
            mypy==2.1.0 \
            bandit==1.9.4 \
            mutmut==3.6.0

      - name: Install Node dependencies
        run: npm install

      - name: Run checks
        run: npm run check
